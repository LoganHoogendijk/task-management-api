version: "3.9"

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: taskmanager_user
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: taskmanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager_user -d taskmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://taskmanager_user:devpassword@db:5432/taskmanager
    ports:
      - "8000:8000"

volumes:
  pgdata: