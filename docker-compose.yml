version: "3.9"

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: taskmanager_user
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: taskmanager
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager_user -d taskmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://taskmanager_user:devpassword@db:5432/taskmanager
      TEST_DATABASE_URL: postgresql+asyncpg://taskmanager_user:devpassword@db:5432/taskmanager_test
    ports:
      - "8000:8000"

volumes:
  pgdata: